<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <dir>~/.local/share/fonts</dir>
  <cachedir>~/.cache/fontconfig</cachedir>
  <!-- Make emojis available in cool-retro-term -->
  <alias>
    <family>Hack Nerd Font Mono</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!--
    Rendering pipeline, pinned explicitly rather than relying on whichever
    /etc/fonts/conf.d symlinks a given Debian install ships (those already
    happen to agree with this on laszlo, but a blank-OS rebuild shouldn't
    depend on that coincidence). Slight hinting + native bytecode hinting
    (no autohint) preserves the font's own hint program instead of
    FreeType's generic outline-guesser, which is the biggest single factor
    in text looking "designed" rather than "rasterized". RGB subpixel AA on
    top of that is worth it specifically because the panel (RPI MON156,
    141ppi) sits below the ~200ppi threshold where subpixel AA stops adding
    visible sharpness over grayscale — this is the opposite of what current
    macOS does (grayscale-only, since panels there are HiDPI), so the
    subpixel line is the one knob to flip back to rgba=none first if this
    ever moves to a genuinely HiDPI panel or shows colour fringing.
  -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="autohint" mode="assign"><bool>false</bool></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>
</fontconfig>
