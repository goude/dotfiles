# ~/.config/starship.toml
"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
command_timeout = 500

# ─────────────────────────────────────────────────────────────
# PROMPT FORMAT - explicit ordering, right-side info
# ─────────────────────────────────────────────────────────────
format = """
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$nodejs\
$rust\
$c\
$docker_context\
${custom.ssh}\
${custom.gitmail}\
$cmd_duration\
$line_break\
$character"""

right_format = """${custom.time}${custom.tz}${custom.claude_usage}${custom.disk_space}"""

# ─────────────────────────────────────────────────────────────
# CORE MODULES
# ─────────────────────────────────────────────────────────────

[directory]
truncation_length = 4
truncate_to_repo = true
style = 'bold cyan'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold yellow)' # Visual indicator for vim mode

[cmd_duration]
min_time = 2_000
format = '[$duration]($style) '
style = 'bold yellow'

# ─────────────────────────────────────────────────────────────
# GIT - detailed status for complex repo work
# ─────────────────────────────────────────────────────────────

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = ''
style = 'bold purple'
truncation_length = 20

[git_state]
format = '[\($state( $progress_current/$progress_total)\)]($style) '
style = 'bold yellow'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold red'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?${count}'
stashed = '*${count}'
modified = '!${count}'
staged = '+${count}'
deleted = '✘${count}'

# ─────────────────────────────────────────────────────────────
# LANGUAGES - only what you actually use
# ─────────────────────────────────────────────────────────────

[python]
detect_folders = ['.venv']
detect_files = ['pyproject.toml']

python_binary = ['.venv/bin/python', 'python', 'python3']

format = '[🐍 ${version}(${virtualenv})]($style) '
style = 'bold yellow'

[rust]
detect_extensions = ['rs']
detect_files = ['Cargo.toml']
format = '[🦀 $version]($style) '
style = 'bold red'

[nodejs]
detect_extensions = ['js', 'ts', 'mjs']
detect_files = ['package.json', '.node-version']
format = '[⬢ $version]($style) '
style = 'bold green'

[c]
detect_extensions = ['c', 'h']
format = '[C $version]($style) '
style = 'bold blue'

# ─────────────────────────────────────────────────────────────
# CONTAINERS & INFRA
# ─────────────────────────────────────────────────────────────

[docker_context]
detect_files = [
  'docker-compose.yml',
  'docker-compose.yaml',
  'Dockerfile',
  'compose.yml',
]
format = '[🐳 $context]($style) '
style = 'bold blue'
only_with_files = true

[kubernetes]
disabled = true # Enable when needed: disabled = false

# ─────────────────────────────────────────────────────────────
# CUSTOM MODULES
# ─────────────────────────────────────────────────────────────

# Right-side modules use cursor save/restore escapes that break down
# (staircase-stepping typed text) on narrow/mobile SSH clients like
# Termius; hide the whole right side below this width instead.
# Shared inline rather than a variable: starship "when" commands run in
# their own subshell, so a sourced/exported var wouldn't reach them.

# Show the UTC timezone offset, shortened
[custom.tz]
when = '[ "$(tput cols 2>/dev/null || echo 200)" -ge 80 ]'
command = "date +%z | sed -E 's/^([+-][0-9]{2}).*/\\1/'"
format = '[$output]($style) '
style = 'dimmed white'

# Work vs personal indicator (adjust grep pattern to your work domain)
[custom.gitmail]
command = "git config user.email | grep -qi 'astrazeneca\\|work' && echo '💊' || echo '💩'"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = '[$output]($style) '
style = 'bold'

# Claude Code current-session usage %, read live from pixoo-server's
# /surfaces "claude" VU1 dial value — any host on the tailnet (e.g.
# laszlo) gets the same reading for free, no per-machine cache job
# required. This dial is pushed every 15 min by zelda-server's `just
# usage-dial` cron; the endpoint carries no per-field timestamp, so
# there's no fresh/stale distinction to render (the old .claude.percent
# object that had one was dead data left over from the removed ccusage
# module — see pixoo-server commit 703941c). curl is capped at 1s and
# errors are swallowed so a down/unreachable pixoo-server just blanks
# the module.
#
# POSIX var=value assignment isn't valid fish syntax — pin shell = ["sh"]
# so this doesn't silently no-op under a fish login shell (starship
# defaults to running custom commands via $SHELL, not /bin/sh).
[custom.claude_usage]
command = '''
curl -s -m 1 http://zelda:6464/surfaces 2>/dev/null | jq -r '
  .dials[]? | select(.alias == "claude") | .value | select(. != null) | "󰚩 \(.)%"
' 2>/dev/null
'''
shell = ["sh"]
when = '[ "$(tput cols 2>/dev/null || echo 200)" -ge 80 ]'
format = '[$output]($style) '
style = 'bold magenta'

# Disk space on right side - less intrusive.
# $HOME rather than a fixed path, so it resolves to the real data
# filesystem on any box (Linux root, macOS APFS Data volume, etc).
[custom.disk_space]
command = "df -h \"$HOME\" 2>/dev/null | awk 'NR==2 {gsub(/%/,\"\"); if ($5 > 95) print \"⚠️ \" $5 \"%\"; else print \"💾 \" $5 \"%\"}'"
when = "[ \"$(tput cols 2>/dev/null || echo 200)\" -ge 80 ] && df -h \"$HOME\" 2>/dev/null | awk 'NR==2 {gsub(/%/,\"\"); exit !($5 > 90)}'"
format = ' [$output]($style) '
style = 'bold green'

[custom.ssh]
command = 'echo "$(hostname -s)"'
when = '[ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]'
format = '[󰣀 $output]($style) '
style = 'bold red'

# ─────────────────────────────────────────────────────────────
# RIGHT SIDE & TIME
# ─────────────────────────────────────────────────────────────

[time]
disabled = true # replaced by custom.time, which can gate on terminal width

[custom.time]
command = "date '+W%V %a %d %H:%M'"
when = '[ "$(tput cols 2>/dev/null || echo 200)" -ge 80 ]'
format = '[$output]($style)'
style = 'dimmed white'

# ─────────────────────────────────────────────────────────────
# DISABLED - available if needed
# ─────────────────────────────────────────────────────────────

[package]
disabled = true # Often slow, enable per-project if needed

[aws]
disabled = true # Enable if you use AWS

[gcloud]
disabled = true # Enable if you use GCP
