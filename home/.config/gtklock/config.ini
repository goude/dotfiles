# gtklock lock screen — auto-loaded from ~/.config/gtklock/config.ini.
#
# Styled to echo the LightDM greeter (pi-greeter-labwc): same RPiSystem_dark
# wallpaper + PiXonyx GTK theme, so locking feels like the login screen. The
# unified bar palette + Hack Nerd Font are layered on top via style.css.
[main]
gtk-theme=PiXonyx
background=/usr/share/rpd-wallpaper/RPiSystem_dark.png
style=/home/mind/.config/gtklock/style.css

# Clock echoes the bar's vocabulary (ISO week + weekday).
time-format=%H:%M
date-format=W%V  %a %d %B
